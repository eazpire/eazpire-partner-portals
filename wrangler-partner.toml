# eazpire-partner-portals — Partner + Admin portal Worker (separate from creator-engine)
#
# Deploy: npm run deploy:partner
# Dev:    npm run dev:partner
#
# Secrets (wrangler secret put -c wrangler-partner.toml):
#   RESEND_API_KEY, PARTNER_JWT_SECRET (optional if using JWT_APP_SECRET)
#   PRINTIFY_API_KEY (required for Catalog Studio → Sync Printify; copy from creator-engine:
#     node scripts/deployment/sync-partner-printify-secret.cjs)

name = "eazpire-partner-portals"
main = "src/partner-worker.js"
compatibility_date = "2025-01-15"
compatibility_flags = [ "nodejs_compat" ]

workers_dev = true

[[routes]]
pattern = "partner.eazpire.com/*"
zone_name = "eazpire.com"

[[routes]]
pattern = "admin.eazpire.com/*"
zone_name = "eazpire.com"

[vars]
PARTNER_PORTAL_URL = "https://partner.eazpire.com"
ADMIN_PARTNER_URL = "https://admin.eazpire.com/partner"
ADMIN_OWNER_IDS = "9415375946010"
ADMIN_OWNER_EMAILS = "tobi.muss@hotmail.com"
ACCOUNT_DELETION_FROM_EMAIL = "Eazpire <noreply@eazpire.com>"
# Phase 2+3: catalog-db as ops master (read + write)
CATALOG_OPS_MASTER_READ = "1"
CATALOG_OPS_MASTER_WRITE = "1"
# Same Printify shop as creator-engine (fetchPrintifyProductById / template sync)
PRINTIFY_SHOP_ID = "22170465"

[[kv_namespaces]]
binding = "JOBS"
id = "46fe4f02bc6544c286ea28ac0b4d9e22"

[[d1_databases]]
binding = "MANUFACTURER_DB"
database_name = "manufacturer-db"
database_id = "e6eef5c7-d29d-46ec-b052-96a787ec40e4"
migrations_dir = "migrations-manufacturer"

# Read-only access for Printify sync + mirror (online products, PAT, publish profiles)
[[d1_databases]]
binding = "CATALOG_DB"
database_name = "catalog-db"
database_id = "c053e4e5-df6e-4eba-9e99-b5f05c18888b"

# Published designs + variant config (Products tab, variant pricing mirror)
[[d1_databases]]
binding = "CREATOR_DB"
database_name = "creator-db"
database_id = "9c7965da-2cad-40af-a6fa-1a4ce6c4d116"

[assets]
binding = "PARTNER_ASSETS"
directory = "partner-static"
run_worker_first = ["/partner", "/partner/*"]

[[r2_buckets]]
binding = "MOCKUP_R2"
bucket_name = "product-mockups"
